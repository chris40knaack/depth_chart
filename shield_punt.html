<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shield Punt Designer</title>
  <style>html,body,#root{margin:0;height:100%;background:#082316;}</style>

  <!-- React + Babel from CDN (needs internet on first open) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Shim: back the artifact-runtime window.storage with localStorage so
       assignment edits persist between sessions in a normal browser. -->
  <script>
    window.storage = {
      async get(key) {
        const value = localStorage.getItem(key);
        return value === null ? null : { value };
      },
      async set(key, value) {
        localStorage.setItem(key, String(value));
      },
    };
  </script>
  <!-- data-less public build: roster + assignments are imported at runtime -->

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo, useRef } = React;

    // ============================================================
    //  SHIELD PUNT DESIGNER
    //  - Roster comes from athletes.json (baked in as window.__ATHLETES__).
    //    Athlete data is read-only here — edit it in the Roster Editor.
    //  - Position assignments live in a SEPARATE file, assignments.json
    //    (baked in as window.__ASSIGNMENTS__): edit here, then
    //    "Save assignments" downloads an updated copy.
    //  - Assignments also autosave in-browser via window.storage.
    // ============================================================

    const SLOTS = [
      { key: "LE", name: "Left End", x: 0.16, y: 0.33, group: "end" },
      { key: "LT", name: "Left Tackle", x: 0.28, y: 0.33, group: "tackle" },
      { key: "LG", name: "Left Guard", x: 0.40, y: 0.33, group: "guard" },
      { key: "LS", name: "Long Snapper", x: 0.50, y: 0.33, group: "snap" },
      { key: "RG", name: "Right Guard", x: 0.60, y: 0.33, group: "guard" },
      { key: "RT", name: "Right Tackle", x: 0.72, y: 0.33, group: "tackle" },
      { key: "RE", name: "Right End", x: 0.84, y: 0.33, group: "end" },
      { key: "LW", name: "Left Wing", x: 0.41, y: 0.60, group: "shield" },
      { key: "PP", name: "Personal Protector", x: 0.50, y: 0.60, group: "shield" },
      { key: "RW", name: "Right Wing", x: 0.59, y: 0.60, group: "shield" },
      { key: "P", name: "Punter", x: 0.50, y: 0.84, group: "punter" },
    ];
    const SLOT_KEYS = SLOTS.map((s) => s.key);
    const VALID = new Set(SLOT_KEYS);

    const MAX_DEPTH = 5; // 1 starter + up to 4 backups
    const padDepth = (arr) => { const a = Array.isArray(arr) ? arr.slice(0, MAX_DEPTH) : []; while (a.length < MAX_DEPTH) a.push(null); return a; };
    const normalizeAssign = (a) => { const A = {}; SLOT_KEYS.forEach((k) => (A[k] = padDepth(a && a[k]))); return A; };
    const emptyAssign = () => { const A = {}; SLOT_KEYS.forEach((k) => (A[k] = padDepth([]))); return A; };
    const clampDepth = (d) => Math.min(MAX_DEPTH, Math.max(1, Number(d) || 3));

    const GROUP_COLORS = { end: "#d8e9ff", tackle: "#ffffff", guard: "#ffd54a", snap: "#e6e6e6", shield: "#ffc72c", punter: "#e6e6e6" };
    const GROUP_LABEL = { end: "End — speed", tackle: "Tackle", guard: "Guard — strength", snap: "Specialist", shield: "Shield — size", punter: "Specialist" };

    // ---- data baked in at build time ----
    const ATHLETE_DATA = typeof window !== "undefined" && window.__ATHLETES__ ? window.__ATHLETES__ : { athletes: [] };
    const BAKED_ASSIGNMENTS = typeof window !== "undefined" && window.__ASSIGNMENTS__ ? window.__ASSIGNMENTS__ : null;

    // athletes.json record -> the lightweight player shape the UI needs
    function metricNote(a) {
      const m = a.metrics || {}, parts = [];
      if (a.measurements && a.measurements.weightLb) parts.push(a.measurements.weightLb + "lb");
      if (m.speed && m.speed.fortyYardSec) parts.push(m.speed.fortyYardSec + "s");
      if (m.strength && m.strength.liftTotalLb) parts.push(m.strength.liftTotalLb + " tot");
      return parts.join(" · ");
    }
    const athleteToPlayer = (a) => ({
      id: a.id,
      name: (a.name && a.name.full) || "",
      number: a.number ?? null,
      gr: a.grade != null ? String(a.grade) : "",
      note: metricNote(a),
      active: !!a.active,
      positions: a.positions || {},
    });
    const ROSTER = (ATHLETE_DATA.athletes || []).map(athleteToPlayer);
    const HAS_BAKED = ROSTER.length > 0; // false in the hosted, data-less build
    // accept either a full athletes.json envelope or a bare array
    const rosterFromJSON = (parsed) => { const list = Array.isArray(parsed) ? parsed : parsed && parsed.athletes; return Array.isArray(list) ? list.map(athleteToPlayer) : null; };

    // fallback default lineup, derived from each athlete's punt position tags
    function placeInto(A, code, id) {
      const c = (code || "").toUpperCase();
      if (!VALID.has(c)) return;
      const open = A[c].findIndex((x) => x == null);
      if (open !== -1) A[c][open] = id;
    }
    function deriveAssign() {
      const A = emptyAssign();
      ROSTER.forEach((p) => placeInto(A, p.positions.puntPrimary, p.id));
      ROSTER.forEach((p) => placeInto(A, p.positions.puntBackup, p.id));
      return A;
    }
    const seedAssign = () => (BAKED_ASSIGNMENTS && BAKED_ASSIGNMENTS.assignments ? normalizeAssign(BAKED_ASSIGNMENTS.assignments) : deriveAssign());
    const seedTitle = (BAKED_ASSIGNMENTS && BAKED_ASSIGNMENTS.title) || "2026 Shield Punt";
    const seedDepth = clampDepth(BAKED_ASSIGNMENTS && BAKED_ASSIGNMENTS.depth);

    const STORAGE_KEY = "shieldpunt:assign:v1"; // assignments only — roster comes from athletes.json
    const ROSTER_KEY = "shieldpunt:roster:v1"; // imported roster, persisted only in the data-less build

    function ShieldPuntDesigner() {
      const [roster, setRoster] = useState(ROSTER);
      const [assign, setAssign] = useState(seedAssign);
      const [depth, setDepth] = useState(seedDepth);
      const [title, setTitle] = useState(seedTitle);
      const [status, setStatus] = useState("");
      const [statusType, setStatusType] = useState("info");
      const [selected, setSelected] = useState(null);
      const [loaded, setLoaded] = useState(false);
      const [view, setView] = useState("0"); // field diagram: "0"=starters, "1".."4"=backup level, "all"
      const [activeOnly, setActiveOnly] = useState(false); // filter roster + dropdowns to active players
      const assignFileRef = useRef(null);
      const athletesFileRef = useRef(null);

      // load saved assignments (a separate store from the athlete data)
      useEffect(() => {
        (async () => {
          try {
            const res = await window.storage.get(STORAGE_KEY);
            if (res && res.value) {
              const s = JSON.parse(res.value);
              if (s.assign) {
                setAssign(normalizeAssign(s.assign));
                if (s.title) setTitle(s.title);
                setDepth(clampDepth(s.depth));
                setStatus("Loaded your saved assignments."); setStatusType("ok");
              }
            }
          } catch (e) {}
          if (!HAS_BAKED) {
            try { const rr = await window.storage.get(ROSTER_KEY); if (rr && rr.value) { const list = JSON.parse(rr.value); if (Array.isArray(list) && list.length) setRoster(list); } } catch (e) {}
          }
          setLoaded(true);
        })();
      }, []);

      // autosave assignments (not the roster)
      useEffect(() => {
        if (!loaded) return;
        const t = setTimeout(async () => { try { await window.storage.set(STORAGE_KEY, JSON.stringify({ assign, title, depth })); } catch (e) {} }, 400);
        return () => clearTimeout(t);
      }, [assign, title, depth, loaded]);

      const rosterById = useMemo(() => { const m = {}; roster.forEach((p) => (m[p.id] = p)); return m; }, [roster]);
      const activeTotal = useMemo(() => roster.filter((p) => p.active).length, [roster]);
      const starterIds = useMemo(() => new Set(SLOT_KEYS.map((k) => assign[k] && assign[k][0]).filter(Boolean)), [assign]);

      // count cells where a player is assigned to more than one slot at the same depth level
      const dupCount = useMemo(() => {
        let n = 0;
        for (let d = 0; d < depth; d++) {
          const counts = {};
          SLOT_KEYS.forEach((k) => { const id = assign[k][d]; if (id) counts[id] = (counts[id] || 0) + 1; });
          SLOT_KEYS.forEach((k) => { const id = assign[k][d]; if (id && counts[id] > 1) n += 1; });
        }
        return n;
      }, [assign, depth]);

      // count assigned cells holding a non-active player
      const inactiveCount = useMemo(() => {
        let n = 0;
        for (let d = 0; d < depth; d++) SLOT_KEYS.forEach((k) => { const p = rosterById[assign[k][d]]; if (p && !p.active) n += 1; });
        return n;
      }, [assign, depth, rosterById]);

      const shownRoster = activeOnly ? roster.filter((p) => p.active) : roster;

      const setSlot = (slot, d, id) => setAssign((prev) => ({ ...prev, [slot]: padDepth(prev[slot]).map((v, i) => (i === d ? id : v)) }));

      const resetDefault = () => {
        setAssign(seedAssign());
        setTitle(seedTitle); setDepth(seedDepth);
        setStatus("Reset to the recommended lineup."); setStatusType("info");
      };
      const clearAssign = () => { setAssign(emptyAssign()); setStatus("Cleared all slots."); setStatusType("info"); };

      // --- save / load the separate assignments.json file ---
      const exportAssignments = () => {
        const data = { schemaVersion: 1, generated: new Date().toISOString().slice(0, 10), title, depth, source: "athletes.json", assignments: assign };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob); const a = document.createElement("a");
        a.href = url; a.download = "assignments.json"; a.click(); URL.revokeObjectURL(url);
        setStatus("Saved assignments.json. Drop it into the project and re-run build_html.ps1 to bake it in."); setStatusType("ok");
      };
      const onAssignFile = (file) => {
        if (!file) return;
        const rd = new FileReader();
        rd.onload = (e) => {
          try {
            const parsed = JSON.parse(String(e.target.result));
            const a = parsed.assignments || parsed;
            if (!a || typeof a !== "object") { setStatus("No assignments found in that file."); setStatusType("err"); return; }
            setAssign(normalizeAssign(a));
            if (parsed.title) setTitle(parsed.title);
            if (parsed.depth) setDepth(clampDepth(parsed.depth));
            const placed = SLOT_KEYS.reduce((n, k) => n + (a[k] || []).filter(Boolean).length, 0);
            setStatus("Loaded assignments.json (" + placed + " players placed)."); setStatusType("ok");
          } catch (err) { setStatus("Could not parse JSON: " + err.message); setStatusType("err"); }
        };
        rd.readAsText(file);
      };

      // import a new roster from an athletes.json file (session only — does not change assignments)
      const onAthletesFile = (file) => {
        if (!file) return;
        const rd = new FileReader();
        rd.onload = (e) => {
          try {
            const list = rosterFromJSON(JSON.parse(String(e.target.result)));
            if (!list || !list.length) { setStatus("No athletes found in that file."); setStatusType("err"); return; }
            setRoster(list);
            if (!HAS_BAKED) { try { window.storage.set(ROSTER_KEY, JSON.stringify(list)); } catch (e) {} }
            const orphans = SLOT_KEYS.reduce((n, k) => n + assign[k].filter((id) => id != null && !list.some((p) => p.id === id)).length, 0);
            setStatus("Imported " + list.length + " athletes." + (orphans ? " " + orphans + " assigned spot(s) reference IDs not in this file." : "")); setStatusType(orphans ? "info" : "ok");
          } catch (err) { setStatus("Could not parse athletes JSON: " + err.message); setStatusType("err"); }
        };
        rd.readAsText(file);
      };

      const exportCSV = () => {
        const lines = ["Slot,Depth,Number,Player,Grade,Note"];
        SLOT_KEYS.forEach((k) => assign[k].forEach((id, d) => { if (id && rosterById[id]) { const p = rosterById[id]; lines.push([k, d + 1, p.number ?? "", '"' + p.name + '"', p.gr, '"' + (p.note || "") + '"'].join(",")); } }));
        const blob = new Blob([lines.join("\n")], { type: "text/csv" });
        const url = URL.createObjectURL(blob); const a = document.createElement("a");
        a.href = url; a.download = title.replace(/\s+/g, "_") + "_lineup.csv"; a.click(); URL.revokeObjectURL(url);
      };

      const FW = 760, FH = 560;
      const nameAt = (k, d) => { const id = assign[k] && assign[k][d]; const p = id && rosterById[id]; return p ? p.name : ""; };
      const abbr = (nm) => (nm ? nm.split(" ").map((w, i) => (i === 0 ? w[0] + "." : w)).join(" ") : "");
      const slotLines = (k) => {
        if (view === "all") return Array.from({ length: depth }).map((_, d) => ({ d, name: nameAt(k, d) })).filter((x) => x.name);
        const d = Number(view); const name = nameAt(k, d); return name ? [{ d, name }] : [];
      };

      // keep the field view within the levels the depth chart tracks
      useEffect(() => { if (view !== "all" && Number(view) > depth - 1) setView(String(Math.max(0, depth - 1))); }, [depth, view]);

      return (
        <div style={{ minHeight: "100%", background: "radial-gradient(120% 120% at 50% 0%, #15422a 0%, #0c2e1d 55%, #082316 100%)", fontFamily: "'Barlow Condensed','Oswald',system-ui,sans-serif", color: "#eef3ee", padding: "20px 16px 60px", boxSizing: "border-box" }}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap');
            .osw{font-family:'Oswald',sans-serif;letter-spacing:.5px;}
            .btn{cursor:pointer;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.06);color:#eef3ee;padding:7px 12px;border-radius:7px;font-family:'Oswald',sans-serif;font-size:12.5px;letter-spacing:.6px;text-transform:uppercase;transition:.15s;}
            .btn:hover{background:rgba(255,199,44,.18);border-color:#ffc72c;}
            .sel{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);color:#eef3ee;border-radius:6px;padding:5px 6px;font-family:'Barlow Condensed',sans-serif;font-size:14px;outline:none;}
            .sel:focus{border-color:#ffc72c;}
            .sel option{background:#123524;color:#eef3ee;}
            .player:hover{filter:brightness(1.07);}
            @media print{.noprint{display:none!important;}}
          `}</style>

          <div style={{ maxWidth: 1080, margin: "0 auto" }}>
            <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", flexWrap: "wrap", gap: 12, marginBottom: 12 }}>
              <div>
                <div className="osw" style={{ fontSize: 12, letterSpacing: 3, color: "#ffc72c", textTransform: "uppercase" }}>Special Teams · Playbook</div>
                <input value={title} onChange={(e) => setTitle(e.target.value)} className="osw" style={{ background: "transparent", border: "none", outline: "none", color: "#fff", fontSize: 32, fontWeight: 700, padding: 0, width: "min(540px,80vw)" }} />
              </div>
              <div className="noprint" style={{ display: "flex", gap: 7, flexWrap: "wrap" }}>
                <button className="btn" onClick={() => setActiveOnly((v) => !v)} title="Show only active players in the roster and dropdowns" style={activeOnly ? { background: "rgba(255,199,44,.2)", borderColor: "#ffc72c", color: "#ffe7a3" } : {}}>{activeOnly ? "Active only: ON" : "Active only: OFF"}</button>
                <button className="btn" onClick={() => athletesFileRef.current && athletesFileRef.current.click()} title="Load a new athletes.json roster (session only)">Import athletes</button>
                <button className="btn" onClick={() => assignFileRef.current && assignFileRef.current.click()}>Load assignments</button>
                <button className="btn" onClick={exportAssignments}>Save assignments</button>
                <button className="btn" onClick={resetDefault}>Recommended</button>
                <button className="btn" onClick={clearAssign}>Clear slots</button>
                <button className="btn" onClick={exportCSV}>Export CSV</button>
                <button className="btn" onClick={() => window.print()}>Print</button>
                <input ref={assignFileRef} type="file" accept=".json,application/json" style={{ display: "none" }} onChange={(e) => onAssignFile(e.target.files && e.target.files[0])} />
                <input ref={athletesFileRef} type="file" accept=".json,application/json" style={{ display: "none" }} onChange={(e) => onAthletesFile(e.target.files && e.target.files[0])} />
              </div>
            </div>

            {status && <div className="noprint" style={{ fontSize: 13, padding: "8px 12px", borderRadius: 8, marginBottom: 12, border: "1px solid " + (statusType === "err" ? "#ff8c8c" : statusType === "ok" ? "#8ce0a4" : "rgba(255,255,255,.2)"), background: "rgba(0,0,0,.18)", color: statusType === "err" ? "#ffc4c4" : statusType === "ok" ? "#bdf2cd" : "#cfe0d4" }}>{status}</div>}

            <div className="noprint" style={{ display: "flex", justifyContent: "flex-end", alignItems: "center", gap: 8, marginBottom: 8 }}>
              <span className="osw" style={{ fontSize: 11.5, letterSpacing: 1, textTransform: "uppercase", color: "#cfe0d4" }}>Field shows</span>
              <select className="sel" value={view} onChange={(e) => setView(e.target.value)} style={{ width: "auto", padding: "4px 8px" }}>
                <option value="0">Starters</option>
                {Array.from({ length: depth - 1 }).map((_, i) => <option key={i + 1} value={String(i + 1)}>{"Backup " + (i + 1)}</option>)}
                <option value="all">{"All (" + depth + " deep)"}</option>
              </select>
            </div>

            <div style={{ borderRadius: 14, overflow: "hidden", boxShadow: "0 18px 40px rgba(0,0,0,.45),inset 0 0 0 2px rgba(255,255,255,.08)" }}>
              <svg viewBox={"0 0 " + FW + " " + FH} style={{ width: "100%", display: "block", background: "linear-gradient(180deg,#15532f,#0e3c22)" }}>
                {Array.from({ length: 7 }).map((_, i) => <line key={i} x1="0" x2={FW} y1={70 + i * 70} y2={70 + i * 70} stroke="#fff" strokeOpacity="0.15" strokeWidth="1.5" />)}
                <line x1="0" x2={FW} y1={FH * 0.33 + 30} y2={FH * 0.33 + 30} stroke="#ffc72c" strokeOpacity="0.5" strokeWidth="2" strokeDasharray="7 6" />
                <text x="10" y={FH * 0.33 + 24} className="osw" fill="#ffc72c" fontSize="11" opacity="0.8">LOS</text>
                {SLOTS.map((s) => {
                  const cx = s.x * FW, cy = s.y * FH;
                  const lines = slotLines(s.key);
                  const isSel = selected === s.key;
                  return (
                    <g key={s.key} className="player" style={{ cursor: "pointer" }} onClick={() => setSelected(isSel ? null : s.key)}>
                      <circle cx={cx} cy={cy} r="22" fill={GROUP_COLORS[s.group]} stroke={isSel ? "#ff5722" : "#0e3c22"} strokeWidth={isSel ? 4 : 2.5} />
                      <text x={cx} y={cy + 5} textAnchor="middle" className="osw" fontSize="14" fontWeight="700" fill="#11241a">{s.key}</text>
                      {lines.length === 0
                        ? <text x={cx} y={cy + 36} textAnchor="middle" className="osw" fontSize="12.5" fontWeight="600" fill="#fff" opacity="0.45">—</text>
                        : lines.map((ln, i) => {
                            const prominent = view !== "all" || ln.d === 0;
                            return (
                              <text key={ln.d} x={cx} y={cy + 36 + i * 12} textAnchor="middle" className="osw"
                                    fontSize={prominent ? "12.5" : "11"} fontWeight={prominent ? "700" : "500"}
                                    fill={prominent ? "#fff" : "#cfe9d6"} opacity={prominent ? 1 : 0.85}>
                                {(view === "all" && ln.d !== 0 ? ln.d + " " : "") + abbr(ln.name)}
                              </text>
                            );
                          })}
                    </g>
                  );
                })}
              </svg>
            </div>

            <div style={{ display: "flex", gap: 16, flexWrap: "wrap", margin: "10px 2px 18px", fontSize: 12.5 }}>
              {Object.entries(GROUP_LABEL).map(([k, v]) => (
                <span key={k} style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
                  <span style={{ width: 13, height: 13, borderRadius: 4, background: GROUP_COLORS[k], border: "1px solid rgba(255,255,255,.3)" }} />{v}
                </span>
              ))}
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "minmax(0,1.7fr) minmax(0,1fr)", gap: 16, alignItems: "start" }}>
              <div>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, marginBottom: 10, flexWrap: "wrap" }}>
                  <div style={{ display: "inline-flex", alignItems: "center", gap: 10 }}>
                    <div className="osw" style={{ fontSize: 13, letterSpacing: 2.5, color: "#ffc72c", textTransform: "uppercase" }}>Depth Chart — assign from roster</div>
                    {dupCount > 0 && <span className="osw" title="A player is assigned to two slots at the same depth level" style={{ fontSize: 11, letterSpacing: 0.5, color: "#11241a", background: "#ffb74d", borderRadius: 6, padding: "2px 8px", fontWeight: 700 }}>! {dupCount} duplicate{dupCount === 1 ? "" : "s"}</span>}
                    {inactiveCount > 0 && <span className="osw" title="An inactive player is assigned in the lineup" style={{ fontSize: 11, letterSpacing: 0.5, color: "#fff", background: "#c0392b", borderRadius: 6, padding: "2px 8px", fontWeight: 700 }}>✕ {inactiveCount} inactive</span>}
                  </div>
                  <label className="noprint osw" style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 11.5, letterSpacing: 1, textTransform: "uppercase", color: "#cfe0d4" }}>
                    Backups
                    <select className="sel" value={depth - 1} onChange={(e) => setDepth(Number(e.target.value) + 1)} style={{ width: "auto", padding: "4px 6px" }}>
                      {Array.from({ length: MAX_DEPTH }).map((_, n) => <option key={n} value={n}>{n}</option>)}
                    </select>
                  </label>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(220px,1fr))", gap: 10 }}>
                  {SLOTS.map((s) => (
                    <div key={s.key} style={{ border: selected === s.key ? "1px solid #ff5722" : "1px solid rgba(255,255,255,.13)", borderRadius: 10, overflow: "hidden", background: "rgba(255,255,255,.03)" }} onClick={() => setSelected(s.key)}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 11px", background: "rgba(0,0,0,.28)" }}>
                        <span className="osw" style={{ width: 26, height: 26, borderRadius: 6, background: GROUP_COLORS[s.group], color: "#11241a", display: "grid", placeItems: "center", fontWeight: 700, fontSize: 13 }}>{s.key}</span>
                        <span className="osw" style={{ fontSize: 14 }}>{s.name}</span>
                      </div>
                      <div style={{ padding: "7px 8px 9px", display: "flex", flexDirection: "column", gap: 6 }}>
                        {Array.from({ length: depth }).map((_, d) => {
                          const cur = assign[s.key][d];
                          const dupSlots = cur ? SLOT_KEYS.filter((ok) => ok !== s.key && assign[ok][d] === cur) : [];
                          const dup = dupSlots.length > 0;
                          const player = cur ? rosterById[cur] : null;
                          const inactive = player && !player.active;
                          const levelLabel = d === 0 ? "starter" : "backup " + d;
                          const opts = activeOnly ? roster.filter((p) => p.active || p.id === cur) : roster;
                          return (
                            <div key={d} style={{ display: "flex", alignItems: "center", gap: 6 }}>
                              <span style={{ flex: "0 0 14px", fontSize: 11, color: d === 0 ? "#ffc72c" : "#8fae9d", fontWeight: 700 }}>{d === 0 ? "S" : d}</span>
                              <select className="sel" value={cur == null ? "" : cur} onChange={(e) => setSlot(s.key, d, e.target.value || null)}
                                      style={{ ...(d === 0 ? { background: "rgba(255,199,44,.14)" } : {}), ...(inactive ? { borderColor: "#ff8c8c", boxShadow: "0 0 0 1px #ff8c8c" } : dup ? { borderColor: "#ffb74d", boxShadow: "0 0 0 1px #ffb74d" } : {}) }}>
                                <option value="">{d === 0 ? "— starter —" : "—"}</option>
                                {opts.map((p) => <option key={p.id} value={p.id}>{(p.number != null ? "#" + p.number + " " : "") + p.name}{p.gr ? " (" + p.gr + ")" : ""}{p.active ? "" : " — inactive"}</option>)}
                              </select>
                              {inactive && <span title={player.name + " is not active"} style={{ color: "#ff8c8c", fontSize: 13, fontWeight: 700, cursor: "help" }}>✕</span>}
                              {dup && <span title={"Duplicate " + levelLabel + " — also at " + dupSlots.join(", ")} style={{ color: "#ffb74d", fontSize: 14, fontWeight: 700, cursor: "help" }}>!</span>}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8, marginBottom: 10 }}>
                  <div className="osw" style={{ fontSize: 13, letterSpacing: 2.5, color: "#ffc72c", textTransform: "uppercase" }}>{"Roster (" + (activeOnly ? shownRoster.length + " active" : roster.length + " · " + activeTotal + " active") + ")"}</div>
                  <label className="noprint" style={{ display: "inline-flex", alignItems: "center", gap: 5, fontSize: 11.5, color: "#cfe0d4", cursor: "pointer" }}>
                    <input type="checkbox" checked={activeOnly} onChange={(e) => setActiveOnly(e.target.checked)} /> Active only
                  </label>
                </div>
                <div style={{ maxHeight: 560, overflowY: "auto", border: "1px solid rgba(255,255,255,.12)", borderRadius: 10, padding: 6, background: "rgba(0,0,0,.14)" }}>
                  {roster.length === 0 && <div style={{ opacity: .5, fontSize: 13, padding: 10 }}>No athletes loaded. Click “Import athletes” to load an athletes.json file.</div>}
                  {roster.length > 0 && shownRoster.length === 0 && <div style={{ opacity: .5, fontSize: 13, padding: 10 }}>No active players.</div>}
                  {shownRoster.map((p) => {
                    const isStarter = starterIds.has(p.id);
                    return (
                      <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 7px", borderRadius: 7, marginBottom: 3, background: isStarter ? "rgba(255,199,44,.10)" : "transparent", opacity: p.active ? 1 : 0.5 }}>
                        <span style={{ width: 7, height: 7, borderRadius: 9, flex: "0 0 7px", background: isStarter ? "#ffc72c" : "rgba(255,255,255,.22)" }} title={isStarter ? "Starting" : "Available"} />
                        <span className="osw" style={{ flex: "0 0 30px", textAlign: "center", fontSize: 12, color: p.number == null ? "rgba(255,255,255,.35)" : "#ffc72c", fontWeight: 700 }}>{p.number == null ? "—" : p.number}</span>
                        <span style={{ flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.name}</span>
                        {!p.active && <span style={{ flex: "0 0 auto", fontSize: 10, color: "#ff8c8c", border: "1px solid rgba(255,140,140,.5)", borderRadius: 4, padding: "0 4px" }}>inactive</span>}
                        {p.gr && <span style={{ flex: "0 0 auto", fontSize: 11, opacity: .6 }}>gr{p.gr}</span>}
                        {p.note && <span style={{ flex: "0 0 auto", fontSize: 11, color: "#9cbcab", maxWidth: 130, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.note}</span>}
                      </div>
                    );
                  })}
                </div>
                <div style={{ fontSize: 11.5, opacity: .55, marginTop: 8, lineHeight: 1.5 }}>Gold dot = starter. Red “inactive” = not active in athletes.json (edit status in the Roster Editor). The lineup warns if an inactive player is assigned.</div>
              </div>
            </div>

            <div className="noprint" style={{ marginTop: 18, fontSize: 11.5, opacity: .5, lineHeight: 1.5 }}>
              <strong className="osw" style={{ letterSpacing: 1 }}>DATA:</strong> the roster loads from <strong>athletes.json</strong> (edit athletes in the Roster Editor). Use <strong>Import athletes</strong> to load an updated athletes.json without rebuilding (session only). Position assignments are a separate file, <strong>assignments.json</strong> — they autosave in this browser; use <strong>Save assignments</strong> to download an updated copy, drop it in the project, and re-run <strong>build_html.ps1</strong>.
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<ShieldPuntDesigner />);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kickoff Return Designer</title>
  <style>html,body,#root{margin:0;height:100%;background:#07182b;}</style>

  <!-- React + Babel from CDN (needs internet on first open) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Shim: back the artifact-runtime window.storage with localStorage so
       assignment edits persist between sessions in a normal browser. -->
  <script>
    window.storage = {
      async get(key) {
        const value = localStorage.getItem(key);
        return value === null ? null : { value };
      },
      async set(key, value) {
        localStorage.setItem(key, String(value));
      },
    };
  </script>
  <!-- which special-teams unit this page is -->
  <script>window.__FORMATION__ = "kickoff_return";</script>

  <!-- data-less public build: roster + assignments are imported at runtime -->

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo, useRef } = React;

    // ============================================================
    //  FORMATION DESIGNER  (one component, multiple special-teams units)
    //  - The active formation is chosen by window.__FORMATION__ ("punt" |
    //    "kickoff"), baked in at build time. Each formation defines its slots,
    //    colors, field line, title, storage prefix, and assignments file.
    //  - Roster comes from athletes.json (window.__ATHLETES__), read-only here.
    //  - Position assignments live in a SEPARATE file per formation
    //    (assignments.json / kickoff_assignments.json), baked as
    //    window.__ASSIGNMENTS__: edit here, then "Save assignments" downloads it.
    // ============================================================

    const CONFIGS = {
      punt: {
        prefix: "shieldpunt",
        title: "2026 Shield Punt",
        assignmentsFile: "assignments.json",
        lineY: 0.33, lineLabel: "LOS",
        deriveTags: ["puntPrimary", "puntBackup"], // seed a lineup from athletes' punt tags
        groupColors: { end: "#d8e9ff", tackle: "#ffffff", guard: "#a9d3ff", snap: "#e6e6e6", shield: "#5bb0ff", punter: "#e6e6e6" },
        groupLabel: { end: "End — speed", tackle: "Tackle", guard: "Guard — strength", snap: "Specialist", shield: "Shield — size", punter: "Specialist" },
        slots: [
          { key: "LE", name: "Left End", x: 0.16, y: 0.33, group: "end" },
          { key: "LT", name: "Left Tackle", x: 0.28, y: 0.33, group: "tackle" },
          { key: "LG", name: "Left Guard", x: 0.40, y: 0.33, group: "guard" },
          { key: "LS", name: "Long Snapper", x: 0.50, y: 0.33, group: "snap" },
          { key: "RG", name: "Right Guard", x: 0.60, y: 0.33, group: "guard" },
          { key: "RT", name: "Right Tackle", x: 0.72, y: 0.33, group: "tackle" },
          { key: "RE", name: "Right End", x: 0.84, y: 0.33, group: "end" },
          { key: "LW", name: "Left Wing", x: 0.41, y: 0.60, group: "shield" },
          { key: "PP", name: "Personal Protector", x: 0.50, y: 0.60, group: "shield" },
          { key: "RW", name: "Right Wing", x: 0.59, y: 0.60, group: "shield" },
          { key: "P", name: "Punter", x: 0.50, y: 0.84, group: "punter" },
        ],
      },
      kickoff: {
        prefix: "kickoff",
        title: "2026 Kickoff Coverage",
        assignmentsFile: "kickoff_assignments.json",
        lineY: 0.30, lineLabel: "KICK",
        deriveTags: [], // athletes.json has no kickoff tags — start empty
        groupColors: { coverage: "#d8e9ff", contain: "#5bb0ff", kicker: "#e6e6e6" },
        groupLabel: { coverage: "Coverage", contain: "Contain — outside / safety", kicker: "Kicker" },
        slots: [
          { key: "L5", name: "Left 5 — contain", x: 0.07, y: 0.30, group: "contain" },
          { key: "L4", name: "Left 4", x: 0.155, y: 0.30, group: "coverage" },
          { key: "L3", name: "Left 3", x: 0.24, y: 0.30, group: "coverage" },
          { key: "L2", name: "Left 2", x: 0.325, y: 0.30, group: "coverage" },
          { key: "L1", name: "Left 1", x: 0.41, y: 0.30, group: "coverage" },
          { key: "R1", name: "Right 1", x: 0.59, y: 0.30, group: "coverage" },
          { key: "R2", name: "Right 2", x: 0.675, y: 0.30, group: "coverage" },
          { key: "R3", name: "Right 3", x: 0.76, y: 0.30, group: "coverage" },
          { key: "R4", name: "Right 4", x: 0.845, y: 0.30, group: "coverage" },
          { key: "R5", name: "Right 5 — contain", x: 0.93, y: 0.30, group: "contain" },
          { key: "K", name: "Kicker", x: 0.50, y: 0.47, group: "kicker" },
        ],
      },
      offense: {
        prefix: "offense",
        title: "2026 Offense",
        assignmentsFile: "offense_assignments.json",
        lineY: 0.30, lineLabel: "LOS",
        deriveTags: [],
        groupColors: { ol: "#ffffff", te: "#a9d3ff", wr: "#d8e9ff", back: "#5bb0ff", qb: "#e6e6e6" },
        groupLabel: { ol: "O-Line", te: "Tight End", wr: "Receiver", back: "Running Back", qb: "Quarterback" },
        slots: [
          { key: "X", name: "X — split end", x: 0.07, y: 0.34, group: "wr" },
          { key: "LT", name: "Left Tackle", x: 0.30, y: 0.30, group: "ol" },
          { key: "LG", name: "Left Guard", x: 0.385, y: 0.30, group: "ol" },
          { key: "C", name: "Center", x: 0.47, y: 0.30, group: "ol" },
          { key: "RG", name: "Right Guard", x: 0.555, y: 0.30, group: "ol" },
          { key: "RT", name: "Right Tackle", x: 0.64, y: 0.30, group: "ol" },
          { key: "TE", name: "Tight End", x: 0.725, y: 0.30, group: "te" },
          { key: "SL", name: "Slot", x: 0.83, y: 0.36, group: "wr" },
          { key: "Z", name: "Z — flanker", x: 0.93, y: 0.34, group: "wr" },
          { key: "QB", name: "Quarterback", x: 0.47, y: 0.45, group: "qb" },
          { key: "RB", name: "Running Back", x: 0.47, y: 0.58, group: "back" },
        ],
      },
      defense: {
        prefix: "defense",
        title: "2026 Defense",
        assignmentsFile: "defense_assignments.json",
        lineY: 0.30, lineLabel: "LOS",
        deriveTags: [],
        groupColors: { dl: "#d8e9ff", lb: "#5bb0ff", db: "#e6e6e6" },
        groupLabel: { dl: "D-Line", lb: "Linebacker", db: "Defensive Back" },
        slots: [
          { key: "LE", name: "Left End", x: 0.32, y: 0.30, group: "dl" },
          { key: "LDT", name: "Left Tackle", x: 0.43, y: 0.30, group: "dl" },
          { key: "RDT", name: "Right Tackle", x: 0.54, y: 0.30, group: "dl" },
          { key: "RE", name: "Right End", x: 0.65, y: 0.30, group: "dl" },
          { key: "W", name: "Will LB", x: 0.34, y: 0.44, group: "lb" },
          { key: "M", name: "Mike LB", x: 0.485, y: 0.44, group: "lb" },
          { key: "S", name: "Sam LB", x: 0.63, y: 0.44, group: "lb" },
          { key: "LCB", name: "Left Corner", x: 0.10, y: 0.40, group: "db" },
          { key: "RCB", name: "Right Corner", x: 0.90, y: 0.40, group: "db" },
          { key: "FS", name: "Free Safety", x: 0.40, y: 0.63, group: "db" },
          { key: "SS", name: "Strong Safety", x: 0.585, y: 0.63, group: "db" },
        ],
      },
      pat: {
        prefix: "pat",
        title: "2026 PAT / Field Goal",
        assignmentsFile: "pat_assignments.json",
        lineY: 0.30, lineLabel: "LOS",
        deriveTags: [],
        groupColors: { line: "#ffffff", wing: "#a9d3ff", hold: "#d8e9ff", kicker: "#e6e6e6" },
        groupLabel: { line: "Line", wing: "Wing", hold: "Holder", kicker: "Kicker" },
        slots: [
          { key: "LE", name: "Left End", x: 0.20, y: 0.30, group: "line" },
          { key: "LT", name: "Left Tackle", x: 0.30, y: 0.30, group: "line" },
          { key: "LG", name: "Left Guard", x: 0.40, y: 0.30, group: "line" },
          { key: "LS", name: "Long Snapper", x: 0.50, y: 0.30, group: "line" },
          { key: "RG", name: "Right Guard", x: 0.60, y: 0.30, group: "line" },
          { key: "RT", name: "Right Tackle", x: 0.70, y: 0.30, group: "line" },
          { key: "RE", name: "Right End", x: 0.80, y: 0.30, group: "line" },
          { key: "LW", name: "Left Wing", x: 0.13, y: 0.37, group: "wing" },
          { key: "RW", name: "Right Wing", x: 0.87, y: 0.37, group: "wing" },
          { key: "H", name: "Holder", x: 0.465, y: 0.52, group: "hold" },
          { key: "K", name: "Kicker", x: 0.465, y: 0.64, group: "kicker" },
        ],
      },
      kickoff_return: {
        prefix: "koreturn",
        title: "2026 Kickoff Return",
        assignmentsFile: "kickoff_return_assignments.json",
        lineY: 0.22, lineLabel: "FRONT",
        deriveTags: [],
        groupColors: { front: "#d8e9ff", mid: "#a9d3ff", returner: "#5bb0ff" },
        groupLabel: { front: "Front line", mid: "Mid blocker", returner: "Returner" },
        slots: [
          { key: "F1", name: "Front 1", x: 0.14, y: 0.22, group: "front" },
          { key: "F2", name: "Front 2", x: 0.30, y: 0.22, group: "front" },
          { key: "F3", name: "Front 3", x: 0.50, y: 0.22, group: "front" },
          { key: "F4", name: "Front 4", x: 0.70, y: 0.22, group: "front" },
          { key: "F5", name: "Front 5", x: 0.86, y: 0.22, group: "front" },
          { key: "M1", name: "Mid 1", x: 0.25, y: 0.45, group: "mid" },
          { key: "M2", name: "Mid 2", x: 0.42, y: 0.45, group: "mid" },
          { key: "M3", name: "Mid 3", x: 0.58, y: 0.45, group: "mid" },
          { key: "M4", name: "Mid 4", x: 0.75, y: 0.45, group: "mid" },
          { key: "KR1", name: "Returner 1", x: 0.40, y: 0.78, group: "returner" },
          { key: "KR2", name: "Returner 2", x: 0.60, y: 0.78, group: "returner" },
        ],
      },
      punt_block: {
        prefix: "puntblock",
        title: "2026 Punt Block / Return",
        assignmentsFile: "punt_block_assignments.json",
        lineY: 0.30, lineLabel: "LOS",
        deriveTags: [],
        groupColors: { rush: "#d8e9ff", jam: "#a9d3ff", mid: "#5bb0ff", returner: "#e6e6e6" },
        groupLabel: { rush: "Rusher", jam: "Jammer", mid: "Middle", returner: "Returner" },
        slots: [
          { key: "LJ", name: "Left Jammer", x: 0.06, y: 0.30, group: "jam" },
          { key: "LE", name: "Left End", x: 0.19, y: 0.30, group: "rush" },
          { key: "LT", name: "Left Tackle", x: 0.30, y: 0.30, group: "rush" },
          { key: "LG", name: "Left Guard", x: 0.41, y: 0.30, group: "rush" },
          { key: "RG", name: "Right Guard", x: 0.59, y: 0.30, group: "rush" },
          { key: "RT", name: "Right Tackle", x: 0.70, y: 0.30, group: "rush" },
          { key: "RE", name: "Right End", x: 0.81, y: 0.30, group: "rush" },
          { key: "RJ", name: "Right Jammer", x: 0.94, y: 0.30, group: "jam" },
          { key: "MID", name: "Middle", x: 0.50, y: 0.45, group: "mid" },
          { key: "UB", name: "Up Back", x: 0.50, y: 0.60, group: "returner" },
          { key: "PR", name: "Punt Returner", x: 0.50, y: 0.80, group: "returner" },
        ],
      },
    };
    const FORMATION = typeof window !== "undefined" && window.__FORMATION__ && CONFIGS[window.__FORMATION__] ? window.__FORMATION__ : "punt";
    const CFG = CONFIGS[FORMATION];

    const SLOTS = CFG.slots;
    const SLOT_KEYS = SLOTS.map((s) => s.key);
    const VALID = new Set(SLOT_KEYS);
    const GROUP_COLORS = CFG.groupColors;
    const GROUP_LABEL = CFG.groupLabel;

    const MAX_DEPTH = 5; // 1 starter + up to 4 backups
    const padDepth = (arr) => { const a = Array.isArray(arr) ? arr.slice(0, MAX_DEPTH) : []; while (a.length < MAX_DEPTH) a.push(null); return a; };
    const normalizeAssign = (a) => { const A = {}; SLOT_KEYS.forEach((k) => (A[k] = padDepth(a && a[k]))); return A; };
    const emptyAssign = () => { const A = {}; SLOT_KEYS.forEach((k) => (A[k] = padDepth([]))); return A; };
    const clampDepth = (d) => Math.min(MAX_DEPTH, Math.max(1, Number(d) || 3));

    // ---- data baked in at build time ----
    const ATHLETE_DATA = typeof window !== "undefined" && window.__ATHLETES__ ? window.__ATHLETES__ : { athletes: [] };
    const BAKED_ASSIGNMENTS = typeof window !== "undefined" && window.__ASSIGNMENTS__ ? window.__ASSIGNMENTS__ : null;

    // athletes.json record -> the lightweight player shape the UI needs
    function metricNote(a) {
      const m = a.metrics || {}, parts = [];
      if (a.measurements && a.measurements.weightLb) parts.push(a.measurements.weightLb + "lb");
      if (m.speed && m.speed.fortyYardSec) parts.push(m.speed.fortyYardSec + "s");
      if (m.strength && m.strength.liftTotalLb) parts.push(m.strength.liftTotalLb + " tot");
      return parts.join(" · ");
    }
    const athleteToPlayer = (a) => ({
      id: a.id,
      name: (a.name && a.name.full) || "",
      number: a.number ?? null,
      gr: a.grade != null ? String(a.grade) : "",
      note: metricNote(a),
      active: !!a.active,
      positions: a.positions || {},
    });
    const ROSTER = (ATHLETE_DATA.athletes || []).map(athleteToPlayer);
    const HAS_BAKED = ROSTER.length > 0; // false in the hosted, data-less build
    // accept either a full athletes.json envelope or a bare array
    const rosterFromJSON = (parsed) => { const list = Array.isArray(parsed) ? parsed : parsed && parsed.athletes; return Array.isArray(list) ? list.map(athleteToPlayer) : null; };

    // fallback default lineup, derived from each athlete's position tags (if any)
    function placeInto(A, code, id) {
      const c = (code || "").toUpperCase();
      if (!VALID.has(c)) return;
      const open = A[c].findIndex((x) => x == null);
      if (open !== -1) A[c][open] = id;
    }
    function deriveAssign() {
      const A = emptyAssign();
      (CFG.deriveTags || []).forEach((tag) => ROSTER.forEach((p) => placeInto(A, p.positions[tag], p.id)));
      return A;
    }
    const seedAssign = () => (BAKED_ASSIGNMENTS && BAKED_ASSIGNMENTS.assignments ? normalizeAssign(BAKED_ASSIGNMENTS.assignments) : deriveAssign());
    const seedTitle = (BAKED_ASSIGNMENTS && BAKED_ASSIGNMENTS.title) || CFG.title;
    const seedDepth = clampDepth(BAKED_ASSIGNMENTS && BAKED_ASSIGNMENTS.depth);

    const STORAGE_KEY = CFG.prefix + ":assign:v1"; // assignments only — roster comes from athletes.json
    const ROSTER_KEY = CFG.prefix + ":roster:v1"; // imported roster, persisted only in the data-less build

    function FormationDesigner() {
      const [roster, setRoster] = useState(ROSTER);
      const [assign, setAssign] = useState(seedAssign);
      const [depth, setDepth] = useState(seedDepth);
      const [title, setTitle] = useState(seedTitle);
      const [status, setStatus] = useState("");
      const [statusType, setStatusType] = useState("info");
      const [selected, setSelected] = useState(null);
      const [loaded, setLoaded] = useState(false);
      const [view, setView] = useState("0"); // field diagram: "0"=starters, "1".."4"=backup level, "all"
      const [activeOnly, setActiveOnly] = useState(false); // filter roster + dropdowns to active players
      const [dragId, setDragId] = useState(null);  // player id being dragged
      const [dropKey, setDropKey] = useState(null); // hovered drop target ("LE:0" or "field:LE")
      const assignFileRef = useRef(null);
      const athletesFileRef = useRef(null);

      // load saved assignments (a separate store from the athlete data)
      useEffect(() => {
        (async () => {
          try {
            const res = await window.storage.get(STORAGE_KEY);
            if (res && res.value) {
              const s = JSON.parse(res.value);
              if (s.assign) {
                setAssign(normalizeAssign(s.assign));
                if (s.title) setTitle(s.title);
                setDepth(clampDepth(s.depth));
                setStatus("Loaded your saved assignments."); setStatusType("ok");
              }
            }
          } catch (e) {}
          if (!HAS_BAKED) {
            try { const rr = await window.storage.get(ROSTER_KEY); if (rr && rr.value) { const list = JSON.parse(rr.value); if (Array.isArray(list) && list.length) setRoster(list); } } catch (e) {}
          }
          setLoaded(true);
        })();
      }, []);

      // autosave assignments (not the roster)
      useEffect(() => {
        if (!loaded) return;
        const t = setTimeout(async () => { try { await window.storage.set(STORAGE_KEY, JSON.stringify({ assign, title, depth })); } catch (e) {} }, 400);
        return () => clearTimeout(t);
      }, [assign, title, depth, loaded]);

      const rosterById = useMemo(() => { const m = {}; roster.forEach((p) => (m[p.id] = p)); return m; }, [roster]);
      const activeTotal = useMemo(() => roster.filter((p) => p.active).length, [roster]);
      const starterIds = useMemo(() => new Set(SLOT_KEYS.map((k) => assign[k] && assign[k][0]).filter(Boolean)), [assign]);

      // count cells where a player is assigned to more than one slot at the same depth level
      const dupCount = useMemo(() => {
        let n = 0;
        for (let d = 0; d < depth; d++) {
          const counts = {};
          SLOT_KEYS.forEach((k) => { const id = assign[k][d]; if (id) counts[id] = (counts[id] || 0) + 1; });
          SLOT_KEYS.forEach((k) => { const id = assign[k][d]; if (id && counts[id] > 1) n += 1; });
        }
        return n;
      }, [assign, depth]);

      // count assigned cells holding a non-active player
      const inactiveCount = useMemo(() => {
        let n = 0;
        for (let d = 0; d < depth; d++) SLOT_KEYS.forEach((k) => { const p = rosterById[assign[k][d]]; if (p && !p.active) n += 1; });
        return n;
      }, [assign, depth, rosterById]);

      const shownRoster = activeOnly ? roster.filter((p) => p.active) : roster;

      const setSlot = (slot, d, id) => setAssign((prev) => ({ ...prev, [slot]: padDepth(prev[slot]).map((v, i) => (i === d ? id : v)) }));

      // drag a roster player onto a depth row or field position to assign them
      const onDragStartPlayer = (e, id) => { e.dataTransfer.setData("text/plain", id); e.dataTransfer.effectAllowed = "copy"; setDragId(id); };
      const allowDrop = (e, key) => { e.preventDefault(); e.dataTransfer.dropEffect = "copy"; if (dropKey !== key) setDropKey(key); };
      const doDrop = (e, slot, d) => { e.preventDefault(); e.stopPropagation(); const id = e.dataTransfer.getData("text/plain") || dragId; if (id) setSlot(slot, d, id); setDropKey(null); setDragId(null); };
      const endDrag = () => { setDropKey(null); setDragId(null); };

      const resetDefault = () => {
        setAssign(seedAssign());
        setTitle(seedTitle); setDepth(seedDepth);
        setStatus("Reset to the recommended lineup."); setStatusType("info");
      };
      const clearAssign = () => { setAssign(emptyAssign()); setStatus("Cleared all slots."); setStatusType("info"); };

      // --- save / load the separate assignments file ---
      const exportAssignments = () => {
        const data = { schemaVersion: 1, generated: new Date().toISOString().slice(0, 10), formation: FORMATION, title, depth, source: "athletes.json", assignments: assign };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob); const a = document.createElement("a");
        a.href = url; a.download = CFG.assignmentsFile; a.click(); URL.revokeObjectURL(url);
        setStatus("Saved " + CFG.assignmentsFile + ". Drop it into the project and re-run build_html.ps1 to bake it in."); setStatusType("ok");
      };
      const onAssignFile = (file) => {
        if (!file) return;
        const rd = new FileReader();
        rd.onload = (e) => {
          try {
            const parsed = JSON.parse(String(e.target.result));
            const a = parsed.assignments || parsed;
            if (!a || typeof a !== "object") { setStatus("No assignments found in that file."); setStatusType("err"); return; }
            setAssign(normalizeAssign(a));
            if (parsed.title) setTitle(parsed.title);
            if (parsed.depth) setDepth(clampDepth(parsed.depth));
            const placed = SLOT_KEYS.reduce((n, k) => n + (a[k] || []).filter(Boolean).length, 0);
            setStatus("Loaded " + (file.name || "assignments") + " (" + placed + " players placed)."); setStatusType("ok");
          } catch (err) { setStatus("Could not parse JSON: " + err.message); setStatusType("err"); }
        };
        rd.readAsText(file);
      };

      // import a new roster from an athletes.json file (session only — does not change assignments)
      const onAthletesFile = (file) => {
        if (!file) return;
        const rd = new FileReader();
        rd.onload = (e) => {
          try {
            const list = rosterFromJSON(JSON.parse(String(e.target.result)));
            if (!list || !list.length) { setStatus("No athletes found in that file."); setStatusType("err"); return; }
            setRoster(list);
            if (!HAS_BAKED) { try { window.storage.set(ROSTER_KEY, JSON.stringify(list)); } catch (e) {} }
            const orphans = SLOT_KEYS.reduce((n, k) => n + assign[k].filter((id) => id != null && !list.some((p) => p.id === id)).length, 0);
            setStatus("Imported " + list.length + " athletes." + (orphans ? " " + orphans + " assigned spot(s) reference IDs not in this file." : "")); setStatusType(orphans ? "info" : "ok");
          } catch (err) { setStatus("Could not parse athletes JSON: " + err.message); setStatusType("err"); }
        };
        rd.readAsText(file);
      };

      const exportCSV = () => {
        const lines = ["Slot,Depth,Number,Player,Grade,Note"];
        SLOT_KEYS.forEach((k) => assign[k].forEach((id, d) => { if (id && rosterById[id]) { const p = rosterById[id]; lines.push([k, d + 1, p.number ?? "", '"' + p.name + '"', p.gr, '"' + (p.note || "") + '"'].join(",")); } }));
        const blob = new Blob([lines.join("\n")], { type: "text/csv" });
        const url = URL.createObjectURL(blob); const a = document.createElement("a");
        a.href = url; a.download = title.replace(/\s+/g, "_") + "_lineup.csv"; a.click(); URL.revokeObjectURL(url);
      };

      const FW = 760, FH = 560;
      const nameAt = (k, d) => { const id = assign[k] && assign[k][d]; const p = id && rosterById[id]; return p ? p.name : ""; };
      const abbr = (nm) => (nm ? nm.split(" ").map((w, i) => (i === 0 ? w[0] + "." : w)).join(" ") : "");
      const slotLines = (k) => {
        if (view === "all") return Array.from({ length: depth }).map((_, d) => ({ d, name: nameAt(k, d) })).filter((x) => x.name);
        const d = Number(view); const name = nameAt(k, d); return name ? [{ d, name }] : [];
      };

      // keep the field view within the levels the depth chart tracks
      useEffect(() => { if (view !== "all" && Number(view) > depth - 1) setView(String(Math.max(0, depth - 1))); }, [depth, view]);

      return (
        <div style={{ minHeight: "100%", background: "radial-gradient(120% 120% at 50% 0%, #163a5f 0%, #0c2742 55%, #07182b 100%)", fontFamily: "'Barlow Condensed','Oswald',system-ui,sans-serif", color: "#eef4fb", padding: "20px 16px 60px", boxSizing: "border-box" }}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap');
            .osw{font-family:'Oswald',sans-serif;letter-spacing:.5px;}
            .btn{cursor:pointer;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.06);color:#eef4fb;padding:7px 12px;border-radius:7px;font-family:'Oswald',sans-serif;font-size:12.5px;letter-spacing:.6px;text-transform:uppercase;transition:.15s;}
            .btn:hover{background:rgba(91,176,255,.18);border-color:#5bb0ff;}
            .sel{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);color:#eef4fb;border-radius:6px;padding:5px 6px;font-family:'Barlow Condensed',sans-serif;font-size:14px;outline:none;}
            .sel:focus{border-color:#5bb0ff;}
            .sel option{background:#10243f;color:#eef4fb;}
            .player:hover{filter:brightness(1.07);}
            @media print{.noprint{display:none!important;}}
          `}</style>

          <div style={{ maxWidth: 1080, margin: "0 auto" }}>
            <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", flexWrap: "wrap", gap: 12, marginBottom: 12 }}>
              <div>
                <div className="osw" style={{ fontSize: 12, letterSpacing: 3, color: "#5bb0ff", textTransform: "uppercase" }}>Special Teams · Playbook</div>
                <input value={title} onChange={(e) => setTitle(e.target.value)} className="osw" style={{ background: "transparent", border: "none", outline: "none", color: "#fff", fontSize: 32, fontWeight: 700, padding: 0, width: "min(540px,80vw)" }} />
              </div>
              <div className="noprint" style={{ display: "flex", gap: 7, flexWrap: "wrap" }}>
                <button className="btn" onClick={() => setActiveOnly((v) => !v)} title="Show only active players in the roster and dropdowns" style={activeOnly ? { background: "rgba(91,176,255,.2)", borderColor: "#5bb0ff", color: "#cfe8ff" } : {}}>{activeOnly ? "Active only: ON" : "Active only: OFF"}</button>
                <button className="btn" onClick={() => athletesFileRef.current && athletesFileRef.current.click()} title="Load a new athletes.json roster (session only)">Import athletes</button>
                <button className="btn" onClick={() => assignFileRef.current && assignFileRef.current.click()}>Load assignments</button>
                <button className="btn" onClick={exportAssignments}>Save assignments</button>
                <button className="btn" onClick={resetDefault}>Recommended</button>
                <button className="btn" onClick={clearAssign}>Clear slots</button>
                <button className="btn" onClick={exportCSV}>Export CSV</button>
                <button className="btn" onClick={() => window.print()}>Print</button>
                <input ref={assignFileRef} type="file" accept=".json,application/json" style={{ display: "none" }} onChange={(e) => onAssignFile(e.target.files && e.target.files[0])} />
                <input ref={athletesFileRef} type="file" accept=".json,application/json" style={{ display: "none" }} onChange={(e) => onAthletesFile(e.target.files && e.target.files[0])} />
              </div>
            </div>

            {status && <div className="noprint" style={{ fontSize: 13, padding: "8px 12px", borderRadius: 8, marginBottom: 12, border: "1px solid " + (statusType === "err" ? "#ff8c8c" : statusType === "ok" ? "#8ce0a4" : "rgba(255,255,255,.2)"), background: "rgba(0,0,0,.18)", color: statusType === "err" ? "#ffc4c4" : statusType === "ok" ? "#bdf2cd" : "#cfe0f0" }}>{status}</div>}

            <div className="noprint" style={{ display: "flex", justifyContent: "flex-end", alignItems: "center", gap: 8, marginBottom: 8 }}>
              <span className="osw" style={{ fontSize: 11.5, letterSpacing: 1, textTransform: "uppercase", color: "#cfe0f0" }}>Field shows</span>
              <select className="sel" value={view} onChange={(e) => setView(e.target.value)} style={{ width: "auto", padding: "4px 8px" }}>
                <option value="0">Starters</option>
                {Array.from({ length: depth - 1 }).map((_, i) => <option key={i + 1} value={String(i + 1)}>{"Backup " + (i + 1)}</option>)}
                <option value="all">{"All (" + depth + " deep)"}</option>
              </select>
            </div>

            <div style={{ borderRadius: 14, overflow: "hidden", boxShadow: "0 18px 40px rgba(0,0,0,.45),inset 0 0 0 2px rgba(255,255,255,.08)" }}>
              <svg viewBox={"0 0 " + FW + " " + FH} style={{ width: "100%", display: "block", background: "linear-gradient(180deg,#1c4e86,#0e2a52)" }}>
                {Array.from({ length: 7 }).map((_, i) => <line key={i} x1="0" x2={FW} y1={70 + i * 70} y2={70 + i * 70} stroke="#fff" strokeOpacity="0.15" strokeWidth="1.5" />)}
                <line x1="0" x2={FW} y1={FH * CFG.lineY - 32} y2={FH * CFG.lineY - 32} stroke="#5bb0ff" strokeOpacity="0.5" strokeWidth="2" strokeDasharray="7 6" />
                <text x="10" y={FH * CFG.lineY - 38} className="osw" fill="#5bb0ff" fontSize="11" opacity="0.8">{CFG.lineLabel}</text>
                {SLOTS.map((s) => {
                  const cx = s.x * FW, cy = s.y * FH;
                  const lines = slotLines(s.key);
                  const isSel = selected === s.key;
                  return (
                    <g key={s.key} className="player" style={{ cursor: "pointer" }} onClick={() => setSelected(isSel ? null : s.key)}
                       onDragOver={(e) => allowDrop(e, "field:" + s.key)} onDrop={(e) => doDrop(e, s.key, 0)}>
                      <circle cx={cx} cy={cy} r="22" fill={GROUP_COLORS[s.group]} stroke={dropKey === "field:" + s.key ? "#5bb0ff" : isSel ? "#ff5722" : "#0e2a52"} strokeWidth={dropKey === "field:" + s.key || isSel ? 4 : 2.5} />
                      <text x={cx} y={cy + 5} textAnchor="middle" className="osw" fontSize="14" fontWeight="700" fill="#0c2742">{s.key}</text>
                      {lines.length === 0
                        ? <text x={cx} y={cy + 36} textAnchor="middle" className="osw" fontSize="12.5" fontWeight="600" fill="#fff" opacity="0.45">—</text>
                        : lines.map((ln, i) => {
                            const prominent = view !== "all" || ln.d === 0;
                            return (
                              <text key={ln.d} x={cx} y={cy + 36 + i * 12} textAnchor="middle" className="osw"
                                    fontSize={prominent ? "12.5" : "11"} fontWeight={prominent ? "700" : "500"}
                                    fill={prominent ? "#fff" : "#cfe0f0"} opacity={prominent ? 1 : 0.85}>
                                {(view === "all" && ln.d !== 0 ? ln.d + " " : "") + abbr(ln.name)}
                              </text>
                            );
                          })}
                    </g>
                  );
                })}
              </svg>
            </div>

            <div style={{ display: "flex", gap: 16, flexWrap: "wrap", margin: "10px 2px 18px", fontSize: 12.5 }}>
              {Object.entries(GROUP_LABEL).map(([k, v]) => (
                <span key={k} style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
                  <span style={{ width: 13, height: 13, borderRadius: 4, background: GROUP_COLORS[k], border: "1px solid rgba(255,255,255,.3)" }} />{v}
                </span>
              ))}
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "minmax(0,1.7fr) minmax(0,1fr)", gap: 16, alignItems: "start" }}>
              <div>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, marginBottom: 10, flexWrap: "wrap" }}>
                  <div style={{ display: "inline-flex", alignItems: "center", gap: 10 }}>
                    <div className="osw" style={{ fontSize: 13, letterSpacing: 2.5, color: "#5bb0ff", textTransform: "uppercase" }}>Depth Chart — assign from roster</div>
                    {dupCount > 0 && <span className="osw" title="A player is assigned to two slots at the same depth level" style={{ fontSize: 11, letterSpacing: 0.5, color: "#0c2742", background: "#ffb74d", borderRadius: 6, padding: "2px 8px", fontWeight: 700 }}>! {dupCount} duplicate{dupCount === 1 ? "" : "s"}</span>}
                    {inactiveCount > 0 && <span className="osw" title="An inactive player is assigned in the lineup" style={{ fontSize: 11, letterSpacing: 0.5, color: "#fff", background: "#c0392b", borderRadius: 6, padding: "2px 8px", fontWeight: 700 }}>✕ {inactiveCount} inactive</span>}
                  </div>
                  <label className="noprint osw" style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 11.5, letterSpacing: 1, textTransform: "uppercase", color: "#cfe0f0" }}>
                    Backups
                    <select className="sel" value={depth - 1} onChange={(e) => setDepth(Number(e.target.value) + 1)} style={{ width: "auto", padding: "4px 6px" }}>
                      {Array.from({ length: MAX_DEPTH }).map((_, n) => <option key={n} value={n}>{n}</option>)}
                    </select>
                  </label>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(220px,1fr))", gap: 10 }}>
                  {SLOTS.map((s) => (
                    <div key={s.key} style={{ border: selected === s.key ? "1px solid #ff5722" : "1px solid rgba(255,255,255,.13)", borderRadius: 10, overflow: "hidden", background: "rgba(255,255,255,.03)" }} onClick={() => setSelected(s.key)}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 11px", background: "rgba(0,0,0,.28)" }}>
                        <span className="osw" style={{ width: 26, height: 26, borderRadius: 6, background: GROUP_COLORS[s.group], color: "#0c2742", display: "grid", placeItems: "center", fontWeight: 700, fontSize: 13 }}>{s.key}</span>
                        <span className="osw" style={{ fontSize: 14 }}>{s.name}</span>
                      </div>
                      <div style={{ padding: "7px 8px 9px", display: "flex", flexDirection: "column", gap: 6 }}>
                        {Array.from({ length: depth }).map((_, d) => {
                          const cur = assign[s.key][d];
                          const dupSlots = cur ? SLOT_KEYS.filter((ok) => ok !== s.key && assign[ok][d] === cur) : [];
                          const dup = dupSlots.length > 0;
                          const player = cur ? rosterById[cur] : null;
                          const inactive = player && !player.active;
                          const levelLabel = d === 0 ? "starter" : "backup " + d;
                          const opts = activeOnly ? roster.filter((p) => p.active || p.id === cur) : roster;
                          const overKey = s.key + ":" + d;
                          return (
                            <div key={d} onDragOver={(e) => allowDrop(e, overKey)} onDrop={(e) => doDrop(e, s.key, d)}
                                 style={{ display: "flex", alignItems: "center", gap: 6, borderRadius: 6, outline: dropKey === overKey ? "2px dashed #5bb0ff" : "none", outlineOffset: 1, background: dropKey === overKey ? "rgba(91,176,255,.12)" : "transparent" }}>
                              <span style={{ flex: "0 0 14px", fontSize: 11, color: d === 0 ? "#5bb0ff" : "#8fa6c4", fontWeight: 700 }}>{d === 0 ? "S" : d}</span>
                              <select className="sel" value={cur == null ? "" : cur} onChange={(e) => setSlot(s.key, d, e.target.value || null)}
                                      style={{ ...(d === 0 ? { background: "rgba(91,176,255,.14)" } : {}), ...(inactive ? { borderColor: "#ff8c8c", boxShadow: "0 0 0 1px #ff8c8c" } : dup ? { borderColor: "#ffb74d", boxShadow: "0 0 0 1px #ffb74d" } : {}) }}>
                                <option value="">{d === 0 ? "— starter —" : "—"}</option>
                                {opts.map((p) => <option key={p.id} value={p.id}>{(p.number != null ? "#" + p.number + " " : "") + p.name}{p.gr ? " (" + p.gr + ")" : ""}{p.active ? "" : " — inactive"}</option>)}
                              </select>
                              {inactive && <span title={player.name + " is not active"} style={{ color: "#ff8c8c", fontSize: 13, fontWeight: 700, cursor: "help" }}>✕</span>}
                              {dup && <span title={"Duplicate " + levelLabel + " — also at " + dupSlots.join(", ")} style={{ color: "#ffb74d", fontSize: 14, fontWeight: 700, cursor: "help" }}>!</span>}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8, marginBottom: 10 }}>
                  <div className="osw" style={{ fontSize: 13, letterSpacing: 2.5, color: "#5bb0ff", textTransform: "uppercase" }}>{"Roster (" + (activeOnly ? shownRoster.length + " active" : roster.length + " · " + activeTotal + " active") + ")"}</div>
                  <label className="noprint" style={{ display: "inline-flex", alignItems: "center", gap: 5, fontSize: 11.5, color: "#cfe0f0", cursor: "pointer" }}>
                    <input type="checkbox" checked={activeOnly} onChange={(e) => setActiveOnly(e.target.checked)} /> Active only
                  </label>
                </div>
                <div style={{ maxHeight: 560, overflowY: "auto", border: "1px solid rgba(255,255,255,.12)", borderRadius: 10, padding: 6, background: "rgba(0,0,0,.14)" }}>
                  {roster.length === 0 && <div style={{ opacity: .5, fontSize: 13, padding: 10 }}>No athletes loaded. Click “Import athletes” to load an athletes.json file.</div>}
                  {roster.length > 0 && shownRoster.length === 0 && <div style={{ opacity: .5, fontSize: 13, padding: 10 }}>No active players.</div>}
                  {shownRoster.map((p) => {
                    const isStarter = starterIds.has(p.id);
                    return (
                      <div key={p.id} draggable onDragStart={(e) => onDragStartPlayer(e, p.id)} onDragEnd={endDrag} title="Drag onto a slot or field position"
                           style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 7px", borderRadius: 7, marginBottom: 3, cursor: "grab", background: dragId === p.id ? "rgba(91,176,255,.22)" : isStarter ? "rgba(91,176,255,.10)" : "transparent", opacity: p.active ? 1 : 0.5 }}>
                        <span style={{ flex: "0 0 9px", color: "rgba(255,255,255,.3)", fontSize: 12, lineHeight: 1 }}>⠿</span>
                        <span style={{ width: 7, height: 7, borderRadius: 9, flex: "0 0 7px", background: isStarter ? "#5bb0ff" : "rgba(255,255,255,.22)" }} title={isStarter ? "Starting" : "Available"} />
                        <span className="osw" style={{ flex: "0 0 30px", textAlign: "center", fontSize: 12, color: p.number == null ? "rgba(255,255,255,.35)" : "#5bb0ff", fontWeight: 700 }}>{p.number == null ? "—" : p.number}</span>
                        <span style={{ flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.name}</span>
                        {!p.active && <span style={{ flex: "0 0 auto", fontSize: 10, color: "#ff8c8c", border: "1px solid rgba(255,140,140,.5)", borderRadius: 4, padding: "0 4px" }}>inactive</span>}
                        {p.gr && <span style={{ flex: "0 0 auto", fontSize: 11, opacity: .6 }}>gr{p.gr}</span>}
                        {p.note && <span style={{ flex: "0 0 auto", fontSize: 11, color: "#9cb0c8", maxWidth: 130, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.note}</span>}
                      </div>
                    );
                  })}
                </div>
                <div style={{ fontSize: 11.5, opacity: .55, marginTop: 8, lineHeight: 1.5 }}><strong>Drag a player</strong> onto a depth-chart row or a field circle to assign them (or use the dropdowns). Gold dot = starter; red “inactive” = not active in athletes.json. The lineup warns on duplicates and inactive players.</div>
              </div>
            </div>

            <div className="noprint" style={{ marginTop: 18, fontSize: 11.5, opacity: .5, lineHeight: 1.5 }}>
              <strong className="osw" style={{ letterSpacing: 1 }}>DATA:</strong> the roster loads from <strong>athletes.json</strong> (edit athletes in the Roster Editor). Use <strong>Import athletes</strong> to load an updated athletes.json without rebuilding (session only). Position assignments are a separate file, <strong>{CFG.assignmentsFile}</strong> — they autosave in this browser; use <strong>Save assignments</strong> to download an updated copy, drop it in the project, and re-run <strong>build_html.ps1</strong>.
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<FormationDesigner />);
  </script>
</body>
</html>
